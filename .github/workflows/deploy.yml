name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure deploy domain
        run: |
          if [ "${PUBLIC_CUSTOM_DOMAIN}" = "true" ]; then
            cp public/CNAME.production public/CNAME
          else
            rm -f public/CNAME
          fi
        env:
          PUBLIC_CUSTOM_DOMAIN: 'false'

      - name: Install, build, and upload
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20
        env:
          PUBLIC_CUSTOM_DOMAIN: 'false'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
