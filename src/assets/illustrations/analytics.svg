<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Healthcare analytics dashboard">
  <rect width="800" height="600" fill="none"/>
  <!-- monitor -->
  <rect x="220" y="120" width="360" height="240" rx="16" fill="#1F2A44"/>
  <rect x="240" y="140" width="320" height="200" rx="8" fill="#FAF8F5"/>
  <!-- chart bars -->
  <rect x="270" y="260" width="36" height="60" rx="6" fill="#C9A14A"/>
  <rect x="320" y="230" width="36" height="90" rx="6" fill="#E5512B"/>
  <rect x="370" y="250" width="36" height="70" rx="6" fill="#1F2A44" opacity="0.3"/>
  <rect x="420" y="210" width="36" height="110" rx="6" fill="#E5512B" opacity="0.7"/>
  <rect x="470" y="240" width="36" height="80" rx="6" fill="#C9A14A" opacity="0.7"/>
  <!-- line chart -->
  <polyline points="270,190 310,170 350,185 390,150 430,165 470,140 510,155" fill="none" stroke="#E5512B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- stand -->
  <rect x="370" y="360" width="60" height="20" rx="4" fill="#1F2A44"/>
  <rect x="340" y="380" width="120" height="12" rx="6" fill="#1F2A44"/>
  <!-- pie chart floating -->
  <circle cx="620" cy="200" r="60" fill="#F1ECE3"/>
  <path d="M620 140 A60 60 0 0 1 680 200 L620 200 Z" fill="#E5512B"/>
  <path d="M620 140 A60 60 0 1 1 580 250 L620 200 Z" fill="#C9A14A"/>
  <!-- stat badge -->
  <rect x="120" y="320" width="120" height="80" rx="12" fill="#F1ECE3"/>
  <text x="180" y="365" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#E5512B">+23%</text>
  <text x="180" y="388" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#5A6478">Patient satisfaction</text>
</svg>
