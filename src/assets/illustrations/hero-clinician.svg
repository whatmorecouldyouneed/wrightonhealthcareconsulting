  <circle cx="280" cy="260" r="42" fill="#FFD4C4"/>
  <path d="M220 420 Q280 360 340 420 L340 480 L220 480 Z" fill="#C9A14A"/>
  <!-- clinician -->
  <ellipse cx="520" cy="480" rx="90" ry="18" fill="#1F2A44" opacity="0.08"/>
