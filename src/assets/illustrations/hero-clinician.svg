  <rect x="575" y="370" width="55" height="8" rx="4" fill="#C9A14A" opacity="0.5"/>
  <!-- heart icon -->
  <circle cx="180" cy="180" r="50" fill="#F1ECE3"/>
  <path d="M180 210 C160 190 145 175 145 160 C145 148 155 140 165 140 C172 140 178 144 180 150 C182 144 188 140 195 140 C205 140 215 148 215 160 C215 175 200 190 180 210Z" fill="#E5512B"/>
  <!-- cross -->
  <rect x="620" y="130" width="16" height="50" rx="4" fill="#C9A14A"/>
  <rect x="603" y="147" width="50" height="16" rx="4" fill="#C9A14A"/>
</svg>
