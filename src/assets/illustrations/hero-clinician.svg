  <path d="M450 420 Q520 350 590 420 L590 480 L450 480 Z" fill="#FFFFFF" stroke="#1F2A44" stroke-width="3"/>
  <path d="M450 380 L590 380 L590 420 L450 420 Z" fill="#E5512B"/>
