<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Healthcare team collaboration">
  <rect width="800" height="600" fill="none"/>
  <!-- table -->
  <ellipse cx="400" cy="460" rx="200" ry="24" fill="#1F2A44" opacity="0.08"/>
  <rect x="250" y="380" width="300" height="16" rx="8" fill="#C9A14A" opacity="0.4"/>
  <!-- person left -->
  <circle cx="260" cy="280" r="36" fill="#FFD4C4"/>
  <path d="M210 370 Q260 320 310 370 L310 420 L210 420 Z" fill="#E5512B"/>
  <!-- person center -->
  <circle cx="400" cy="260" r="40" fill="#FFD4C4"/>
  <path d="M340 370 Q400 310 460 370 L460 420 L340 420 Z" fill="#FFFFFF" stroke="#1F2A44" stroke-width="3"/>
  <path d="M340 340 L460 340 L460 370 L340 370 Z" fill="#1F2A44"/>
  <!-- person right -->
  <circle cx="540" cy="280" r="36" fill="#FFD4C4"/>
  <path d="M490 370 Q540 320 590 370 L590 420 L490 420 Z" fill="#C9A14A"/>
  <!-- handshake -->
  <path d="M350 350 Q380 330 410 350 Q440 370 470 350" fill="none" stroke="#1F2A44" stroke-width="6" stroke-linecap="round"/>
  <!-- documents -->
  <rect x="360" y="390" width="80" height="60" rx="6" fill="#FAF8F5" stroke="#1F2A44" stroke-width="2"/>
  <rect x="375" y="405" width="50" height="6" rx="3" fill="#E5512B" opacity="0.6"/>
  <rect x="375" y="420" width="40" height="6" rx="3" fill="#C9A14A" opacity="0.6"/>
  <!-- plus icon -->
  <circle cx="640" cy="160" r="40" fill="#F1ECE3"/>
  <rect x="632" y="145" width="16" height="30" rx="4" fill="#E5512B"/>
  <rect x="625" y="152" width="30" height="16" rx="4" fill="#E5512B"/>
</svg>
